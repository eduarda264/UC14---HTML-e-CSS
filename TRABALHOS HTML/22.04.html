<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Formulário de Cadastro</h1>
    <h2>Informações Básicas</h2>
    <input type="text" id="inputField" placeholder="Digite aqui seu nome">
    <br>
    <input type="email" id="emailField" placeholder="Digite aqui seu email">
    <br>
    <input type="password" id="passwordField" placeholder="Digite aqui sua senha">
    <br>
    <input type="date" id="dateField">
    <br>
    <h2>Dados Pessoais</h2>
    <input type="number" id="numberField" placeholder="Digite sua idade">
    <br>
    <input type="color" id="colorField">
    <br>
    <label for="sexoField">Sexo:</label>
    <input type="radio" id="sexoField" name="sexo" value="masculino"> Masculino
    <input type="radio" id="sexoField" name="sexo" value="feminino"> Feminino
    <input type="radio" id="sexoField" name="sexo" value="outro"> Outro
    <br>
    <h2>Suas Preferências</h2>
    <label for="hobbiesField">Hobbies:</label>
    <input type="checkbox" id="hobbiesField" name="hobbies" value="esportes"> Esportes
    <input type="checkbox" id="hobbiesField" name="hobbies" value="musica"> Música
    <input type="checkbox" id="hobbiesField" name="hobbies" value="artes"> Artes
    <input type="checkbox" id="hobbiesField" name="hobbies" value="leitura"> Leitura
    <input type="checkbox" id="hobbiesField" name="hobbies" value="viagem"> Viagem
    <input type="checkbox" id="hobbiesField" name="hobbies" value="culinaria"> Culinária
    <input type="checkbox" id="hobbiesField" name="hobbies" value="outros"> Outros
    <br>
    <h2>Selecione um arquivo</h2>
    <br>
    <label for="arquivoField">Selecione um arquivo:</label>
    <input type="file" id="arquivoField">
</body>
</html>
